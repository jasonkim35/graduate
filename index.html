<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 배지 시스템 - 최종 수정판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const BadgeApp = () => {
            const [baseUrl, setBaseUrl] = useState(localStorage.getItem('dh_base_url') || 'https://api.dahandin.com/openapi/v1');
            const [apiKey, setApiKey] = useState(localStorage.getItem('dh_api_key') || '');
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showSettings, setShowSettings] = useState(!apiKey);

            // 데이터 로드 함수 (엔드포인트: /get/student/total)
            const fetchData = useCallback(async () => {
                if (!apiKey) return;
                setLoading(true);
                
                const finalUrl = `${baseUrl}/get/student/total`;
                console.log(`[Requesting Endpoint] ${finalUrl}`);

                try {
                    const response = await fetch(finalUrl, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${apiKey}`,
                            'Accept': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`연결 실패 (${response.status})`);
                    }

                    const result = await response.json();
                    console.log("[Data Received]", result);

                    // API 응답 구조에 따라 데이터 추출 (배열 또는 객체 내의 데이터)
                    const rawData = result.data || result.students || (Array.isArray(result) ? result : []);
                    
                    const formatted = rawData.map(s => ({
                        id: s.uuid || s.id || Math.random(),
                        name: s.name || '이름 없음',
                        badges: Array(12).fill(null) // 12칸 배지 슬롯 초기화
                    }));

                    setStudents(formatted);
                    setShowSettings(false);
                } catch (err) {
                    console.error("[Error]", err);
                    alert(`데이터 로드 실패: ${err.message}\nAPI 키와 Base URL을 다시 확인해 주세요.`);
                } finally {
                    setLoading(false);
                }
            }, [baseUrl, apiKey]);

            const handleSave = () => {
                localStorage.setItem('dh_api_key', apiKey);
                localStorage.setItem('dh_base_url', baseUrl);
                fetchData();
            };

            useEffect(() => { if (apiKey) fetchData(); }, []);

            return (
                <div className="min-h-screen p-6 md:p-10">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-3xl font-black text-indigo-600">다했니? 배지 관리</h1>
                            <p className="text-slate-400 text-sm font-medium">전체 학생 현황 (Total)</p>
                        </div>
                        <button 
                            onClick={() => setShowSettings(true)}
                            className="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-all"
                        >
                            ⚙️ 설정
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-40 gap-4">
                                <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-slate-400 font-bold">학생 명단을 동기화 중...</p>
                            </div>
                        ) : students.length > 0 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {students.map(student => (
                                    <div key={student.id} className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 group">
                                        <h3 className="text-xl font-black text-center text-slate-800 mb-6">{student.name}</h3>
                                        <div className="grid grid-cols-4 gap-2">
                                            {student.badges.map((_, i) => (
                                                <div key={i} className="aspect-square bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center text-[10px] text-slate-300 font-mono">
                                                    {i + 1}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-40 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                <p className="text-slate-400 font-bold text-lg">연동된 데이터가 없습니다. 설정을 확인해 주세요.</p>
                            </div>
                        )}
                    </main>

                    {/* 설정 모달 */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl border border-white/20">
                                <h2 className="text-2xl font-black text-slate-900 mb-6">API 연동</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 ml-1 mb-1 block">Base URL</label>
                                        <input 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-600"
                                            value={baseUrl}
                                            onChange={(e) => setBaseUrl(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 ml-1 mb-1 block">API Key</label>
                                        <input 
                                            type="password"
                                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-600"
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder="API 키 입력"
                                        />
                                    </div>
                                    <button 
                                        onClick={handleSave}
                                        className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all mt-4"
                                    >
                                        설정 저장 및 연동
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
