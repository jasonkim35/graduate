<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니? 배지 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const BadgeApp = () => {
            const [step, setStep] = useState(1);
            const [apiKey, setApiKey] = useState('');
            const [allData, setAllData] = useState([]);
            const [selectedClass, setSelectedClass] = useState('');
            const [loading, setLoading] = useState(false);

            const BASE_URL = 'https://api.dahandin.com/openapi/v1';

            const connectDahhaenni = useCallback(async (targetKey) => {
                const key = (targetKey || apiKey).trim();
                if (!key) return;

                setLoading(true);
                try {
                    // [수정 포인트] Bearer 접두사를 떼고 키만 전달해 봅니다.
                    const response = await fetch(`${BASE_URL}/get/student/total`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': key, // Bearer 없이 키만 전송
                            'Content-Type': 'application/json'
                        }
                    });

                    const result = await response.json();
                    console.log("서버 응답 전문:", result);

                    if (result.result === false || result.status === 'error') {
                        // 만약 키만 보냈는데도 안 된다면, 다시 Bearer를 붙여서 한 번 더 시도
                        console.log("키 단독 전송 실패, Bearer 방식으로 재시도...");
                        const retryResponse = await fetch(`${BASE_URL}/get/student/total`, {
                            method: 'GET',
                            headers: { 
                                'Authorization': `Bearer ${key}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        const retryResult = await retryResponse.json();
                        
                        if (retryResult.result === false) {
                            alert(`다했니 연동 오류: ${retryResult.message}`);
                            setLoading(false);
                            return;
                        }
                        processData(retryResult);
                    } else {
                        processData(result);
                    }
                } catch (err) {
                    console.error("통신 에러:", err);
                    alert("서버 연결 실패. 주소나 인터넷 상태를 확인하세요.");
                } finally {
                    setLoading(false);
                }
            }, [apiKey]);

            const processData = (result) => {
                const students = result.data || result.list || (Array.isArray(result) ? result : []);
                if (students.length === 0) {
                    alert("데이터는 불러왔으나 학생이 없습니다.");
                    return;
                }

                const formatted = students.map(s => ({
                    ...s,
                    name: s.name || s.studentName || '이름없음',
                    className: s.className || '미분류',
                    id: s.studentUuid || s.uuid || Math.random()
                }));

                setAllData(formatted);
                localStorage.setItem('dh_api_key', apiKey.trim());
                setStep(2);

                const classes = [...new Set(formatted.map(s => s.className))];
                if (classes.length > 0) setSelectedClass(classes[0]);
            };

            useEffect(() => {
                const savedKey = localStorage.getItem('dh_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    connectDahhaenni(savedKey);
                }
            }, []);

            const classList = useMemo(() => [...new Set(allData.map(s => s.className))], [allData]);
            const filteredStudents = useMemo(() => allData.filter(s => s.className === selectedClass), [allData, selectedClass]);

            if (step === 1) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center">
                            <h1 className="text-3xl font-black text-indigo-600 mb-8 tracking-tighter">DAHHAENNI</h1>
                            <input 
                                type="text"
                                className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-center font-bold mb-4 outline-none focus:ring-4 focus:ring-indigo-100 transition-all"
                                placeholder="다했니 API 키 입력"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                            <button 
                                onClick={() => connectDahhaenni()}
                                className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg"
                            >
                                {loading ? "연결 중..." : "시스템 시작하기"}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6 md:p-12">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10">
                        <h2 className="text-2xl font-black text-slate-800">{selectedClass}</h2>
                        <select 
                            className="bg-white border p-2 rounded-xl font-bold"
                            value={selectedClass}
                            onChange={(e) => setSelectedClass(e.target.value)}
                        >
                            {classList.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </header>
                    <main className="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {filteredStudents.map(student => (
                            <div key={student.id} className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                                <h3 className="text-lg font-bold mb-4">{student.name}</h3>
                                <div className="grid grid-cols-4 gap-2">
                                    {[...Array(12)].map((_, i) => (
                                        <div key={i} className="aspect-square bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-center text-[10px] text-slate-300">
                                            {i + 1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
