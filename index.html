<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 배지 시스템 - Step by Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const BadgeApp = () => {
            const [step, setStep] = useState(1); // 1: 연동 확인, 2: 학급 대시보드
            const [apiKey, setApiKey] = useState(localStorage.getItem('dh_api_key') || '');
            const [allData, setAllData] = useState([]);
            const [selectedClass, setSelectedClass] = useState('');
            const [loading, setLoading] = useState(false);

            const BASE_URL = 'https://api.dahandin.com/openapi/v1';

            // [Step 1] API 연동 확인 및 데이터 호출
            const handleConnect = async () => {
                if (!apiKey) return alert("API 키를 입력해주세요.");
                setLoading(true);
                try {
                    const response = await fetch(`${BASE_URL}/get/student/total`, {
                        headers: { 'Authorization': `Bearer ${apiKey}` }
                    });

                    if (!response.ok) throw new Error('인증 실패');
                    
                    const result = await response.json();
                    const students = result.data || [];
                    
                    if (students.length === 0) {
                        alert("연동은 성공했으나 불러올 학생 데이터가 없습니다.");
                        return;
                    }

                    setAllData(students);
                    localStorage.setItem('dh_api_key', apiKey);
                    
                    // 연동 성공 시 다음 단계로 이동
                    setStep(2);
                    const classes = [...new Set(students.map(s => s.className))];
                    if (classes.length > 0) setSelectedClass(classes[0]);
                } catch (err) {
                    alert("API 키가 유효하지 않거나 연결에 실패했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            // 학급 목록 추출
            const classList = useMemo(() => {
                return [...new Set(allData.map(s => s.className))].filter(Boolean);
            }, [allData]);

            // 선택된 학급 학생 필터링
            const currentStudents = useMemo(() => {
                return allData.filter(s => s.className === selectedClass);
            }, [allData, selectedClass]);

            // 로그아웃 (초기화)
            const handleReset = () => {
                localStorage.removeItem('dh_api_key');
                setApiKey('');
                setStep(1);
                setAllData([]);
            };

            // --- 화면 1: 연동 확인 페이지 ---
            const LandingPage = () => (
                <div className="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-indigo-50 to-white">
                    <div className="max-w-md w-full bg-white rounded-[3rem] p-10 shadow-2xl border border-white/20 fade-in">
                        <div className="text-center mb-10">
                            <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white text-4xl font-black mx-auto mb-6 shadow-xl shadow-indigo-100">D</div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tight">다했니? 연동</h1>
                            <p className="text-slate-400 font-medium mt-2">Open API v1 키를 입력하여<br/>데이터를 확인하세요.</p>
                        </div>
                        <div className="space-y-4">
                            <input 
                                type="password"
                                className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-center font-bold outline-none focus:ring-4 focus:ring-indigo-100 transition-all"
                                placeholder="sk-xxxxxxxxxxxxxxxx"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                            <button 
                                onClick={handleConnect}
                                disabled={loading}
                                className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all flex items-center justify-center"
                            >
                                {loading ? "연결 확인 중..." : "시스템 시작하기"}
                            </button>
                        </div>
                    </div>
                </div>
            );

            // --- 화면 2: 학급 대시보드 페이지 ---
            const DashboardPage = () => (
                <div className="min-h-screen p-6 md:p-12 fade-in">
                    <header className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                        <div className="flex items-center gap-4">
                            <button onClick={handleReset} className="text-2xl hover:scale-110 transition-transform">🔙</button>
                            <div>
                                <h1 className="text-3xl font-black text-slate-900">우리 반 대시보드</h1>
                                <p className="text-slate-400 font-bold text-sm uppercase tracking-widest">{selectedClass || "학급을 선택하세요"}</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 bg-white p-2.5 rounded-[1.5rem] shadow-sm border border-slate-200">
                            <select 
                                className="bg-transparent border-none outline-none px-5 py-1 font-black text-indigo-600 min-w-[180px] cursor-pointer"
                                value={selectedClass}
                                onChange={(e) => setSelectedClass(e.target.value)}
                            >
                                {classList.map(name => <option key={name} value={name}>{name}</option>)}
                            </select>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                            {currentStudents.map(student => (
                                <div key={student.studentUuid} className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tighter">{student.name}</h3>
                                        <div className="w-3 h-3 bg-indigo-500 rounded-full"></div>
                                    </div>
                                    <div className="grid grid-cols-4 gap-3">
                                        {[...Array(12)].map((_, i) => (
                                            <div key={i} className="aspect-square bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center text-[10px] text-slate-300 font-black">
                                                {i + 1}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );

            return step === 1 ? <LandingPage /> : <DashboardPage />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
