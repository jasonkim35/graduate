<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 학급 관리 시스템</title>
    <style>
        :root { --primary: #4f46e5; --error: #ef4444; --success: #10b981; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f3f4f6; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .card { background: white; width: 100%; max-width: 550px; padding: 32px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 10px 0; font-size: 1.5rem; color: #111827; }
        p { color: #6b7280; font-size: 0.95rem; margin-bottom: 24px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        button { padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .status { margin-top: 16px; font-size: 0.9rem; min-height: 20px; text-align: center; font-weight: 500; }
        .hidden { display: none; }
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-top: 2px solid #f3f4f6; }
        th { background: #f9fafb; padding: 12px; font-size: 0.85rem; color: #4b5563; text-align: center; }
        td { padding: 14px; text-align: center; border-bottom: 1px solid #f3f4f6; font-size: 0.95rem; }
        .gender-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .m { background: #eff6ff; color: #2563eb; }
        .f { background: #fff1f2; color: #e11d48; }
    </style>
</head>
<body>

<div class="card">
    <!-- 화면 1: API 연동 입력 -->
    <div id="auth-view">
        <h2>🔑 API 연동 확인</h2>
        <p>매뉴얼에 따라 발급받은 Open API Key를 입력하여 학급 정보를 불러옵니다.</p>
        <div class="input-group">
            <input type="password" id="api-key-input" placeholder="Open API Key를 입력하세요">
            <button onclick="verifyAndConnect()">연동 및 시작하기</button>
        </div>
        <div id="auth-msg" class="status"></div>
    </div>

    <!-- 화면 2: 학생 명단 출력 -->
    <div id="class-view" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="class-title" style="margin:0;">학생 명단</h2>
            <button onclick="location.reload()" style="background: #6b7280; padding: 8px 12px; font-size: 0.8rem;">로그아웃</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th width="20%">번호</th>
                    <th width="50%">이름</th>
                    <th width="30%">성별</th>
                </tr>
            </thead>
            <tbody id="student-tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const API_ENDPOINT = "https://api.dahandin.com/openapi/v1/get/student/total";

    async function verifyAndConnect() {
        const input = document.getElementById('api-key-input');
        const msg = document.getElementById('auth-msg');
        const apiKey = input.value.trim();

        if (!apiKey) {
            updateStatus("API 키를 입력해 주세요.", "var(--error)");
            return;
        }

        updateStatus("인증 확인 중...", "var(--primary)");

        try {
            // 매뉴얼 v1.2 기준: GET 요청 및 Authorization 헤더에 키 직접 전달
            const response = await fetch(API_ENDPOINT, {
                method: 'GET',
                headers: {
                    'Authorization': apiKey,
                    'Accept': 'application/json'
                }
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // 인증 성공 시 화면 전환
                showClassPage(result.data);
            } else {
                // 서버 에러 메시지 출력 (API 키가 올바르지 않은 경우 등)
                updateStatus(`❌ ${result.message || "인증 실패"}`, "var(--error)");
            }
        } catch (error) {
            // CORS 정책 또는 네트워크 에러
            console.error("Connection Error:", error);
            updateStatus("❌ 네트워크 오류 또는 브라우저 보안(CORS) 차단입니다.", "var(--error)");
        }
    }

    function showClassPage(students) {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('class-view').classList.remove('hidden');
        
        const title = document.getElementById('class-title');
        const tbody = document.getElementById('student-tbody');
        
        title.innerText = `학급 명단 (${students.length}명)`;
        
        // 학생 데이터 정렬 (번호순)
        students.sort((a, b) => (a.student_number || 0) - (b.student_number || 0));

        tbody.innerHTML = students.map(s => `
            <tr>
                <td>${s.student_number || '-'}</td>
                <td><b>${s.student_name}</b></td>
                <td>
                    <span class="gender-badge ${s.gender === 'M' ? 'm' : 'f'}">
                        ${s.gender === 'M' ? '남학생' : '여학생'}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    function updateStatus(text, color) {
        const msg = document.getElementById('auth-msg');
        msg.innerText = text;
        msg.style.color = color;
    }
</script>

</body>
</html>
