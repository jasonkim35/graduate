<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 API 매니저</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f9fafb; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px; }
        .card { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #111827; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
        .status { font-size: 14px; margin-bottom: 20px; min-height: 20px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f3f4f6; text-align: left; padding: 12px; font-size: 13px; color: #4b5563; }
        td { padding: 12px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .m { background: #dbeafe; color: #1e40af; }
        .f { background: #fce7f3; color: #9d174d; }
    </style>
</head>
<body>

<div class="card">
    <!-- 섹션 1: API 연동 -->
    <div id="setup-section">
        <h2>교사 API 인증</h2>
        <p style="color: #6b7280; font-size: 14px;">다했니에서 발급받은 Open API Key를 입력하세요.</p>
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="API Key 입력 (앞뒤 공백 자동제거)">
            <button onclick="connect()">연동하기</button>
        </div>
        <div id="msg" class="status"></div>
    </div>

    <!-- 섹션 2: 학생 명단 -->
    <div id="main-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="classTitle">학생 명단</h2>
            <button onclick="location.reload()" style="background: #ef4444; padding: 5px 10px; font-size: 12px;">접속 종료</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>성명</th>
                    <th>성별</th>
                </tr>
            </thead>
            <tbody id="studentList"></tbody>
        </table>
    </div>
</div>

<script>
    const API_HOST = "https://api.dahandin.com/openapi/v1";

    async function connect() {
        const keyInput = document.getElementById('apiKey').value.trim();
        const msg = document.getElementById('msg');
        
        if (!keyInput) {
            updateMsg("키를 입력해주세요.", "red");
            return;
        }

        updateMsg("연동 확인 중...", "blue");

        try {
            // 1. 학생 전체 정보 API 호출로 키 유효성 검사
            const res = await fetch(`${API_HOST}/get/student/total`, {
                method: 'GET',
                headers: {
                    'Authorization': keyInput,
                    'Content-Type': 'application/json'
                }
            });

            const result = await res.json();
            console.log("Debug Response:", result); // 문제 발생 시 F12 콘솔 확인용

            if (res.ok && result.success) {
                renderStudents(result.data);
            } else {
                // 서버에서 전달하는 구체적인 에러 메시지 출력
                const errorDetail = result.message || "API 키가 올바르지 않습니다.";
                updateMsg(`❌ 오류: ${errorDetail}`, "red");
            }
        } catch (e) {
            updateMsg("❌ 네트워크 오류가 발생했습니다. (CORS 또는 인터넷 연결)", "red");
            console.error(e);
        }
    }

    function renderStudents(students) {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        
        const list = document.getElementById('studentList');
        list.innerHTML = students.map(s => `
            <tr>
                <td><b>${s.student_number || '-'}</b></td>
                <td>${s.student_name}</td>
                <td>
                    <span class="badge ${s.gender === 'M' ? 'm' : 'f'}">
                        ${s.gender === 'M' ? '남학생' : '여학생'}
                    </span>
                </td>
            </tr>
        `).join('');

        document.getElementById('classTitle').innerText = `학급 학생 (${students.length}명)`;
    }

    function updateMsg(text, color) {
        const msg = document.getElementById('msg');
        msg.innerText = text;
        msg.style.color = color === "red" ? "#dc2626" : color === "blue" ? "#2563eb" : "#059669";
    }
</script>

</body>
</html>
