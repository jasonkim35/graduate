<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 배지 시스템 (Dahhaenni Badge)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .badge-slot { aspect-ratio: 1/1; background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #cbd5e1; font-weight: 800; transition: all 0.2s; }
        .badge-slot:hover { border-color: #6366f1; background-color: #eef2ff; color: #6366f1; cursor: pointer; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const BadgeApp = () => {
            const [step, setStep] = useState(1); // 1: 연동확인, 2: 대시보드
            const [apiKey, setApiKey] = useState('');
            const [allData, setAllData] = useState([]);
            const [selectedClass, setSelectedClass] = useState('');
            const [loading, setLoading] = useState(false);

            const BASE_URL = 'https://api.dahandin.com/openapi/v1';

            // --- API 연동 및 데이터 초기화 ---
            const connectDahhaenni = useCallback(async (targetKey) => {
                const key = (targetKey || apiKey).trim();
                if (!key) return;

                setLoading(true);
                try {
                    const response = await fetch(`${BASE_URL}/get/student/total`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': key, // 매뉴얼에 따라 Bearer 생략 가능성 고려
                            'Content-Type': 'application/json'
                        }
                    });

                    const result = await response.json();
                    
                    // 인증 실패 시 Bearer를 붙여서 재시도 (매뉴얼 유연성 대응)
                    if (result.result === false && result.message.includes("KEY")) {
                        const retryResponse = await fetch(`${BASE_URL}/get/student/total`, {
                            headers: { 'Authorization': `Bearer ${key}` }
                        });
                        const retryResult = await retryResponse.json();
                        if (retryResult.result === false) throw new Error(retryResult.message);
                        processSuccess(retryResult.data, key);
                    } else if (result.result !== false) {
                        processSuccess(result.data, key);
                    } else {
                        throw new Error(result.message);
                    }
                } catch (err) {
                    alert(`연동 오류: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            }, [apiKey]);

            const processSuccess = (data, key) => {
                const students = data || [];
                if (students.length === 0) {
                    alert("성공적으로 연동되었으나 불러올 학생이 없습니다.");
                    return;
                }
                setAllData(students);
                localStorage.setItem('dh_api_key', key);
                
                const classes = [...new Set(students.map(s => s.className))].filter(Boolean);
                if (classes.length > 0) setSelectedClass(classes[0]);
                setStep(2);
            };

            // 학급 목록 및 필터링
            const classList = useMemo(() => [...new Set(allData.map(s => s.className))].filter(Boolean), [allData]);
            const filteredStudents = useMemo(() => allData.filter(s => s.className === selectedClass), [allData, selectedClass]);

            const handleLogout = () => {
                localStorage.removeItem('dh_api_key');
                setApiKey('');
                setStep(1);
            };

            useEffect(() => {
                const savedKey = localStorage.getItem('dh_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    connectDahhaenni(savedKey);
                }
            }, []);

            // --- 화면 1: 랜딩 페이지 ---
            if (step === 1) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-50 to-indigo-50">
                        <div className="max-w-md w-full bg-white rounded-[3rem] p-12 shadow-2xl fade-in">
                            <div className="text-center mb-10">
                                <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white text-4xl font-black mx-auto mb-6 shadow-xl shadow-indigo-100 italic">D</div>
                                <h1 className="text-3xl font-bold text-slate-900 tracking-tight">다했니? 배지 연동</h1>
                                <p className="text-slate-400 font-medium mt-2 text-sm leading-relaxed">다했니 API 키를 입력하여<br/>학급 대시보드를 생성하세요.</p>
                            </div>
                            <div className="space-y-4">
                                <input 
                                    type="text"
                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl p-5 text-center font-bold outline-none transition-all shadow-inner"
                                    placeholder="API 키를 입력하세요"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                <button 
                                    onClick={() => connectDahhaenni()}
                                    disabled={loading}
                                    className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all active:scale-95"
                                >
                                    {loading ? "데이터 분석 중..." : "시스템 시작하기"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 화면 2: 대시보드 페이지 ---
            return (
                <div className="min-h-screen p-6 md:p-12 fade-in">
                    <header className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
                        <div className="flex items-center gap-6">
                            <button onClick={handleLogout} className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-200 hover:bg-red-50 hover:text-red-500 transition-all">🔙</button>
                            <div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter italic uppercase underline decoration-indigo-500 decoration-4 underline-offset-8">Dashboard</h2>
                            </div>
                        </div>

                        <div className="flex items-center bg-white rounded-2xl shadow-sm border border-slate-200 p-2">
                            <span className="px-4 text-xs font-black text-slate-400 uppercase border-r border-slate-100">Class</span>
                            <select 
                                className="bg-transparent outline-none px-4 py-2 font-bold text-indigo-600 cursor-pointer min-w-[160px]"
                                value={selectedClass}
                                onChange={(e) => setSelectedClass(e.target.value)}
                            >
                                {classList.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
                        {filteredStudents.map(student => (
                            <div key={student.studentUuid || student.name} className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 hover:shadow-2xl transition-all duration-300 group">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tighter group-hover:text-indigo-600 transition-colors">{student.name}</h3>
                                    <div className="w-3 h-3 bg-indigo-500 rounded-full animate-pulse"></div>
                                </div>
                                <div className="grid grid-cols-4 gap-3">
                                    {[...Array(12)].map((_, i) => (
                                        <div key={i} className="badge-slot" title={`${i+1}번 배지 슬롯`}>
                                            {i + 1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
