<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>다했니 학급 정보 연동</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-area { padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-weight: bold; }
        .loading { background: #e3f2fd; color: #1976d2; }
        .error { background: #ffebee; color: #d32f2f; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #f8f9fa; color: #666; font-size: 0.9em; }
        .gender-m { color: #2196f3; }
        .gender-f { color: #e91e63; }
    </style>
</head>
<body>

<div class="container">
    <!-- 인증 상태 표시부 -->
    <div id="status" class="status-area loading">
        다했니 API 연동 확인 중...
    </div>

    <!-- 데이터 출력부 -->
    <div id="data-view" class="hidden">
        <h2 id="class-title">학급 학생 명단</h2>
        <table>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>이름</th>
                    <th>성별</th>
                </tr>
            </thead>
            <tbody id="student-list"></tbody>
        </table>
    </div>
</div>

<script>
    /**
     * [매뉴얼 기준 설정]
     * 아래 변수에 발급받으신 API Key를 직접 입력하세요.
     */
    // const API_KEY = "여기에_API_키를_넣으세요";
    const API_KEY = "c7c126eab9b888cd1a52c0066896681e4c697644000e758e"; 

    const ENDPOINT = "https://api.dahandin.com/openapi/v1/get/student/total";

    async function authorizeAndLoad() {
        const statusEl = document.getElementById('status');
        
        // 1. 키 입력 확인
        if (!API_KEY || API_KEY === "여기에_API_키를_넣으세요") {
            showError("API KEY가 코드에 입력되지 않았습니다. (MY_API_KEY 변수 확인)");
            return;
        }

        try {
            // 2. 매뉴얼 규격에 맞춘 호출 (Authorization 헤더에 키만 직접 전송)
            const response = await fetch(ENDPOINT, {
                method: 'GET',
                headers: {
                    'Authorization': API_KEY.trim(), // 매뉴얼: Bearer 없이 키값만 사용
                    'Content-Type': 'application/json'
                }
            });

            const result = await response.json();

            // 3. 응답 결과 처리
            if (response.ok && result.success) {
                renderStudents(result.data);
            } else {
                // 매뉴얼상 인증 실패 시 result.message에 상세 이유가 담김
                showError(result.message || "API KEY가 올바르지 않습니다.");
            }
        } catch (error) {
            showError("네트워크 오류 또는 CORS 정책으로 인해 접근이 차단되었습니다.");
            console.error("API Call Error:", error);
        }
    }

    function renderStudents(students) {
        document.getElementById('status').classList.add('hidden');
        document.getElementById('data-view').classList.remove('hidden');
        
        const listBody = document.getElementById('student-list');
        document.getElementById('class-title').innerText = `학급 학생 명단 (${students.length}명)`;

        students.forEach(s => {
            const row = `<tr>
                <td>${s.student_number || '-'}</td>
                <td>${s.student_name}</td>
                <td><span class="${s.gender === 'M' ? 'gender-m' : 'gender-f'}">
                    ${s.gender === 'M' ? '남' : '여'}
                </span></td>
            </tr>`;
            listBody.insertAdjacentHTML('beforeend', row);
        });
    }

    function showError(msg) {
        const statusEl = document.getElementById('status');
        statusEl.className = "status-area error";
        statusEl.innerText = `❌ ${msg}`;
    }

    // 페이지 로드 즉시 실행
    window.onload = authorizeAndLoad;
</script>

</body>
</html>
