<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 배지 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const BadgeApp = () => {
            const [step, setStep] = useState(1); 
            const [apiKey, setApiKey] = useState(localStorage.getItem('dh_api_key') || '');
            const [allData, setAllData] = useState([]);
            const [selectedClass, setSelectedClass] = useState('');
            const [loading, setLoading] = useState(false);

            // 매뉴얼에 명시된 다했니 API 고정 주소
            const BASE_URL = 'https://api.dahandin.com/openapi/v1';

            const handleConnect = async () => {
                const trimmedKey = apiKey.trim(); // 공백 제거
                if (!trimmedKey) return alert("다했니 API 키를 입력해주세요.");
                
                setLoading(true);
                console.log("[다했니 API 연결 시도] Key:", trimmedKey.substring(0, 5) + "...");

                try {
                    // 다했니 API 매뉴얼 v1 기준 호출
                    const response = await fetch(`${BASE_URL}/get/student/total`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${trimmedKey}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    const result = await response.json();
                    console.log("[다했니 응답 결과]", result);

                    if (result.result === false) {
                        // 다했니 서버에서 보낸 에러 메시지 처리
                        alert(`다했니 API 오류: ${result.message}\n(API 키를 다시 확인해 주세요)`);
                        setLoading(false);
                        return;
                    }

                    // 데이터 파싱
                    const students = result.data || [];
                    if (students.length === 0) {
                        alert("연동은 되었으나 관리 중인 학생 데이터가 없습니다.");
                        setLoading(false);
                        return;
                    }

                    // 데이터 정규화
                    const formatted = students.map(s => ({
                        ...s,
                        name: s.name || s.studentName || '이름없음',
                        className: s.className || '미분류',
                        uuid: s.studentUuid || s.uuid || Math.random()
                    }));

                    setAllData(formatted);
                    localStorage.setItem('dh_api_key', trimmedKey);
                    setStep(2);

                    const classes = [...new Set(formatted.map(s => s.className))];
                    if (classes.length > 0) setSelectedClass(classes[0]);

                } catch (err) {
                    console.error("[네트워크 오류]", err);
                    alert("다했니 서버와 통신할 수 없습니다. 인터넷 연결이나 주소를 확인하세요.");
                } finally {
                    setLoading(false);
                }
            };

            const classList = useMemo(() => [...new Set(allData.map(s => s.className))], [allData]);
            const currentStudents = useMemo(() => allData.filter(s => s.className === selectedClass), [allData, selectedClass]);

            const handleLogout = () => {
                localStorage.removeItem('dh_api_key');
                setApiKey('');
                setStep(1);
            };

            // 화면 1: 연동 확인
            if (step === 1) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl max-w-sm w-full text-center border border-slate-100">
                            <h1 className="text-2xl font-black text-indigo-600 mb-6 font-serif tracking-tight italic">Dahhaenni API</h1>
                            <p className="text-slate-400 text-sm mb-8 font-medium italic underline underline-offset-4 decoration-indigo-200 text-pretty">다했니 전용 API 인증이 필요합니다.</p>
                            <input 
                                type="text"
                                className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-center font-mono text-sm mb-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                                placeholder="다했니 API 키를 입력하세요"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                            <button 
                                onClick={handleConnect}
                                disabled={loading}
                                className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-100 active:scale-95 transition-all"
                            >
                                {loading ? "인증 중..." : "다했니 연결하기"}
                            </button>
                        </div>
                    </div>
                );
            }

            // 화면 2: 대시보드
            return (
                <div className="min-h-screen p-6 md:p-10">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10">
                        <div className="flex items-center gap-4">
                            <button onClick={handleLogout} className="p-2 hover:bg-slate-100 rounded-full transition-colors">🔙</button>
                            <h2 className="text-xl font-black text-slate-800">{selectedClass}</h2>
                        </div>
                        <select 
                            className="bg-white border border-slate-200 rounded-xl px-4 py-2 font-bold text-slate-600 shadow-sm outline-none cursor-pointer"
                            value={selectedClass}
                            onChange={(e) => setSelectedClass(e.target.value)}
                        >
                            {classList.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {currentStudents.map(student => (
                            <div key={student.uuid} className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                <h3 className="text-lg font-bold text-slate-800 mb-4">{student.name}</h3>
                                <div className="grid grid-cols-4 gap-2">
                                    {[...Array(12)].map((_, i) => (
                                        <div key={i} className="aspect-square bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-center text-[9px] text-slate-300 font-bold">
                                            {i + 1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
