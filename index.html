<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니? 디지털 배지 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .badge-slot { aspect-ratio: 1/1; background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #cbd5e1; font-weight: 700; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const BadgeApp = () => {
            const [step, setStep] = useState(1); // 1: 인증, 2: 대시보드
            const [apiKey, setApiKey] = useState('');
            const [allData, setAllData] = useState([]);
            const [selectedClass, setSelectedClass] = useState('');
            const [loading, setLoading] = useState(false);

            // 매뉴얼에 명시된 다했니 API 베이스 주소
            const BASE_URL = 'https://api.dahandin.com/openapi/v1';

            // --- [핵심] 데이터 연동 로직 ---
            const connectDahhaenni = useCallback(async (targetKey) => {
                const key = targetKey || apiKey.trim();
                if (!key) return;

                setLoading(true);
                try {
                    const response = await fetch(`${BASE_URL}/get/student/total`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${key}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    const result = await response.json();

                    if (result.result === false) {
                        alert(`다했니 연동 오류: ${result.message}`);
                        localStorage.removeItem('dh_api_key');
                        setStep(1);
                        return;
                    }

                    // 매뉴얼 v1 응답 필드: data
                    const students = result.data || [];
                    if (students.length === 0) {
                        alert("연동 성공! 하지만 불러올 학생 데이터가 없습니다.");
                        return;
                    }

                    // 데이터 정규화 및 상태 업데이트
                    const formatted = students.map(s => ({
                        ...s,
                        name: s.name || '이름 없음',
                        className: s.className || '미분류 학급',
                        id: s.studentUuid || s.uuid || Math.random()
                    }));

                    setAllData(formatted);
                    localStorage.setItem('dh_api_key', key);
                    setStep(2);

                    // 학급 목록 추출 및 첫 번째 학급 자동 선택
                    const classes = [...new Set(formatted.map(s => s.className))];
                    if (classes.length > 0 && !selectedClass) {
                        setSelectedClass(classes[0]);
                    }
                } catch (err) {
                    console.error("API 연결 에러:", err);
                    alert("다했니 서버와 통신할 수 없습니다. 키 또는 인터넷 연결을 확인하세요.");
                } finally {
                    setLoading(false);
                }
            }, [apiKey, selectedClass]);

            // 초기 접속 시 저장된 키가 있으면 자동 연동
            useEffect(() => {
                const savedKey = localStorage.getItem('dh_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    connectDahhaenni(savedKey);
                }
            }, []);

            // 학급 목록/학생 필터링 계산
            const classList = useMemo(() => [...new Set(allData.map(s => s.className))], [allData]);
            const filteredStudents = useMemo(() => allData.filter(s => s.className === selectedClass), [allData, selectedClass]);

            // 로그아웃 (초기화)
            const handleLogout = () => {
                if(confirm("연동을 해제하시겠습니까?")) {
                    localStorage.removeItem('dh_api_key');
                    setApiKey('');
                    setStep(1);
                    setAllData([]);
                }
            };

            // --- 화면 1: 연동 대기 페이지 ---
            if (step === 1) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] p-10 shadow-2xl border border-white text-center">
                            <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white text-4xl font-black mx-auto mb-8 shadow-xl shadow-indigo-100">D</div>
                            <h1 className="text-3xl font-black text-slate-900 mb-2">다했니? 배지 관리</h1>
                            <p className="text-slate-400 font-medium mb-10 text-sm">다했니 API 키를 입력하여<br/>학급 데이터를 동기화하세요.</p>
                            
                            <div className="space-y-4">
                                <input 
                                    type="password"
                                    className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-center font-bold outline-none focus:ring-4 focus:ring-indigo-100 transition-all"
                                    placeholder="다했니 API KEY를 입력하세요"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                <button 
                                    onClick={() => connectDahhaenni()}
                                    disabled={loading}
                                    className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all flex items-center justify-center"
                                >
                                    {loading ? "데이터 확인 중..." : "시스템 시작하기"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 화면 2: 대시보드 페이지 ---
            return (
                <div className="min-h-screen p-6 md:p-12">
                    <header className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                        <div className="flex items-center gap-5">
                            <button onClick={handleLogout} className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors">🔙</button>
                            <div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tight">{selectedClass}</h1>
                                <p className="text-indigo-500 font-bold text-xs uppercase tracking-widest">Dahhaenni Dashboard</p>
                            </div>
                        </div>

                        <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
                            <span className="text-xs font-bold text-slate-400 uppercase ml-2">Class</span>
                            <select 
                                className="bg-transparent border-none outline-none font-black text-slate-700 min-w-[160px] py-2 cursor-pointer"
                                value={selectedClass}
                                onChange={(e) => setSelectedClass(e.target.value)}
                            >
                                {classList.map(name => <option key={name} value={name}>{name}</option>)}
                            </select>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                            {filteredStudents.map(student => (
                                <div key={student.id} className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tighter">{student.name}</h3>
                                        <div className="w-3 h-3 bg-indigo-500 rounded-full animate-pulse"></div>
                                    </div>
                                    <div className="grid grid-cols-4 gap-3">
                                        {[...Array(12)].map((_, i) => (
                                            <div key={i} className="badge-slot">
                                                {i + 1}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
