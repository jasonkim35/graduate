<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다했니 배지 시스템 - 배포 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const BadgeApp = () => {
            // 선생님이 알려주신 Base URL로 고정 (뒤에 슬래시 제거)
            const [baseUrl, setBaseUrl] = useState(localStorage.getItem('dh_base_url') || 'https://api.dahandin.com/openapi/v1');
            const [apiKey, setApiKey] = useState(localStorage.getItem('dh_api_key') || '');
            
            const [classList, setClassList] = useState([]);
            const [selectedClassId, setSelectedClassId] = useState('');
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showSettings, setShowSettings] = useState(!apiKey);

            // API 요청 함수 (경로 겹침 방지 및 에러 로그 강화)
            const dhRequest = useCallback(async (endpoint) => {
                // endpoint가 /로 시작하면 제거해서 중복 방지
                const pureEndpoint = endpoint.startsWith('/') ? endpoint : `/${endpoint}`;
                const finalUrl = `${baseUrl}${pureEndpoint}`;
                
                console.log(`요청 시도: ${finalUrl}`); // 디버깅용

                try {
                    const response = await fetch(finalUrl, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        console.error("서버 응답 에러:", response.status, errorData);
                        throw new Error(`에러 발생: ${response.status}`);
                    }

                    return response.json();
                } catch (err) {
                    console.error("Fetch 작업 중 오류:", err);
                    throw err;
                }
            }, [baseUrl, apiKey]);

            // 학급 목록 및 첫 학급 자동 로드
            const initDashboard = useCallback(async () => {
                if (!apiKey) return;
                setLoading(true);
                try {
                    // 학급 목록 가져오기 엔드포인트 확인 필요 (보통 /classes)
                    const data = await dhRequest('/classes'); 
                    console.log("학급 데이터 로드 성공:", data);
                    
                    const classes = data.classes || data; // 응답 구조에 따라 대응
                    setClassList(Array.isArray(classes) ? classes : []);
                    
                    if (Array.isArray(classes) && classes.length > 0) {
                        const firstId = classes[0].uuid || classes[0].id;
                        setSelectedClassId(firstId);
                        await loadStudents(firstId);
                        setShowSettings(false);
                    } else {
                        alert("담당하고 계신 학급이 없습니다.");
                    }
                } catch (err) {
                    alert(`연동 실패: ${err.message}\nAPI 키와 주소를 다시 확인해주세요.`);
                } finally {
                    setLoading(false);
                }
            }, [apiKey, dhRequest]);

            const loadStudents = async (classId) => {
                if (!classId) return;
                setLoading(true);
                try {
                    const data = await dhRequest(`/classes/${classId}/students`);
                    const studentList = data.students || data;
                    setStudents(studentList.map(s => ({
                        id: s.uuid || s.id,
                        name: s.name,
                        badges: Array(12).fill(null)
                    })));
                } catch (err) {
                    console.error("학생 로드 실패", err);
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = () => {
                localStorage.setItem('dh_api_key', apiKey);
                localStorage.setItem('dh_base_url', baseUrl);
                initDashboard();
            };

            useEffect(() => {
                if (apiKey) initDashboard();
            }, []);

            return (
                <div className="min-h-screen p-6">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-black text-indigo-600">다했니? BADGE</h1>
                        <div className="flex gap-2">
                            <select 
                                className="border rounded-xl px-4 py-2 text-sm font-bold shadow-sm"
                                value={selectedClassId}
                                onChange={(e) => {
                                    setSelectedClassId(e.target.value);
                                    loadStudents(e.target.value);
                                }}
                            >
                                <option value="">학급 선택</option>
                                {classList.map(cls => (
                                    <option key={cls.uuid || cls.id} value={cls.uuid || cls.id}>{cls.name}</option>
                                ))}
                            </select>
                            <button onClick={() => setShowSettings(true)} className="p-2 bg-white border rounded-xl shadow-sm">⚙️</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        {loading ? (
                            <div className="text-center py-20 font-bold text-slate-400">데이터 동기화 중...</div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {students.map(student => (
                                    <div key={student.id} className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                        <h3 className="text-lg font-bold text-center mb-4">{student.name}</h3>
                                        <div className="grid grid-cols-4 gap-2">
                                            {student.badges.map((_, i) => (
                                                <div key={i} className="aspect-square bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-center text-[10px] text-slate-300">
                                                    {i + 1}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl">
                                <h2 className="text-2xl font-black mb-6">API 연동 설정</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block">Base URL</label>
                                        <input className="w-full border rounded-xl p-3 text-sm" value={baseUrl} onChange={e => setBaseUrl(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block">API Key</label>
                                        <input type="password" className="w-full border rounded-xl p-3 text-sm" value={apiKey} onChange={e => setApiKey(e.target.value)} />
                                    </div>
                                    <button onClick={handleSave} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4">연결 및 저장</button>
                                    <button onClick={() => setShowSettings(false)} className="w-full text-slate-400 text-sm mt-2">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BadgeApp />);
    </script>
</body>
</html>
